spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

ply:
  webhook:
    signing-secret: test-signing-secret
    max-clock-skew-seconds: 300
  projector:
    scheduler-enabled: false
    poll-ms: 500
  circuit-breaker:
    failure-threshold: 5
    cooldown-seconds: 60
  rules:
    scheduler-enabled: false
    poll-ms: 30000
