server:
  port: ${PORT:8080}

spring:
  application:
    name: materials-exceptions
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ply}
    username: ${DATABASE_USERNAME:ply}
    password: ${DATABASE_PASSWORD:ply}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

ply:
  webhook:
    signing-secret: ${WEBHOOK_SIGNING_SECRET:local-dev-secret-rotate-me}
    max-clock-skew-seconds: 300
  circuit-breaker:
    failure-threshold: 5
    cooldown-seconds: 60
  projector:
    scheduler-enabled: true
    poll-ms: 500
  rules:
    scheduler-enabled: true
    poll-ms: 30000
