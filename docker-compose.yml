services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ply
      POSTGRES_PASSWORD: ply
      POSTGRES_DB: ply
    ports:
      - "5433:5432"
    volumes:
      - pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ply -d ply"]
      interval: 2s
      timeout: 2s
      retries: 20

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/ply
      DATABASE_USERNAME: ply
      DATABASE_PASSWORD: ply
    ports:
      - "8080:8080"

volumes:
  pg:
